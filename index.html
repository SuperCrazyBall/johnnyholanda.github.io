<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerador de Versículos</title>
<style>
body{
  margin:0;
  font-family: 'Georgia', serif;
  background:#0f172a;
  color:white;
  text-align:center;
}
.container{
  padding:20px;
}
select, textarea, input{
  width:90%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}
button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  font-weight:bold;
  cursor:pointer;
}
canvas{
  margin-top:20px;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>Gerador de Versículo</h2>

<input type="text" id="title" placeholder="Título (ex: Versículo do Dia)">

<select id="verseSelect">
  <option value="Salmos 37:4|Agrade-se do Senhor, e ele satisfará os desejos do seu coração.">Salmos 37:4</option>
  <option value="Jeremias 29:11|Porque eu bem sei os planos que tenho para vocês...">Jeremias 29:11</option>
  <option value="Provérbios 3:5|Confie no Senhor de todo o seu coração...">Provérbios 3:5</option>
</select>

<select id="version">
  <option>NAA</option>
  <option>NVI</option>
  <option>ARA</option>
</select>

<select id="template">
  <option value="nature">Natureza</option>
  <option value="dark">Escuro</option>
  <option value="gold">Dourado</option>
</select>

<input type="file" id="upload" accept="image/*">

<button onclick="generateImage()">Gerar</button>
<button onclick="downloadImage()">Baixar</button>

<br>
<canvas id="canvas" width="1080" height="1080"></canvas>

</div>

<script>
let uploadedImage = null;

document.getElementById("upload").addEventListener("change", function(e){
  const reader = new FileReader();
  reader.onload = function(event){
    uploadedImage = new Image();
    uploadedImage.src = event.target.result;
  }
  reader.readAsDataURL(e.target.files[0]);
});

function generateImage(){
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const title = document.getElementById("title").value;
  const verseData = document.getElementById("verseSelect").value.split("|");
  const reference = verseData[0];
  const verse = verseData[1];
  const version = document.getElementById("version").value;
  const template = document.getElementById("template").value;

  if(uploadedImage){
    ctx.drawImage(uploadedImage,0,0,1080,1080);
  } else {
    if(template==="nature"){
      ctx.fillStyle="#1e3a2f";
    }
    if(template==="dark"){
      ctx.fillStyle="#111827";
    }
    if(template==="gold"){
      ctx.fillStyle="#7c5e10";
    }
    ctx.fillRect(0,0,1080,1080);
  }

  ctx.fillStyle="rgba(0,0,0,0.4)";
  ctx.fillRect(0,0,1080,1080);

  ctx.fillStyle="white";
  ctx.textAlign="left";

  ctx.font="40px Georgia";
  ctx.fillText(title,80,120);

  ctx.font="50px Georgia";
  wrapText(ctx, verse, 80, 300, 920, 70);

  ctx.font="40px Georgia";
  ctx.fillText(reference+" "+version,80,950);
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight){
  const words = text.split(" ");
  let line="";
  for(let n=0;n<words.length;n++){
    const testLine=line+words[n]+" ";
    const metrics=ctx.measureText(testLine);
    if(metrics.width>maxWidth && n>0){
      ctx.fillText(line,x,y);
      line=words[n]+" ";
      y+=lineHeight;
    }else{
      line=testLine;
    }
  }
  ctx.fillText(line,x,y);
}

function downloadImage(){
  const canvas=document.getElementById("canvas");
  const link=document.createElement("a");
  link.download="versiculo.png";
  link.href=canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
