<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff7a00">

<title>Verso Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter,sans-serif;
background:linear-gradient(135deg,#1c1c1c,#0f0f0f);
color:white;
overflow-x:hidden;
}

header{
padding:25px;
text-align:center;
font-size:22px;
font-weight:600;
letter-spacing:2px;
color:#ff7a00;
}

.container{
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
}

.generator{
width:100%;
max-width:480px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border-radius:25px;
padding:25px;
box-shadow:0 25px 50px rgba(0,0,0,0.5);
animation:fadeUp 1s ease;
}

input,select{
width:100%;
padding:14px;
margin-bottom:14px;
border:none;
border-radius:14px;
background:rgba(255,255,255,0.07);
color:white;
font-size:14px;
transition:0.3s;
}

input:focus,select:focus{
outline:none;
background:rgba(255,255,255,0.15);
transform:scale(1.02);
}

.templates{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:15px;
}

.template{
height:80px;
border-radius:14px;
background-size:cover;
background-position:center;
cursor:pointer;
transition:0.4s;
}

.template:hover{
transform:scale(1.05);
}

button {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  font-weight: 600;
  font-size: 16px;
  margin-top: 12px;
  transition: all 0.2s ease;
}

button:active {
  transform: scale(0.96);
}

.btn-principal {
  background: #ff7a00;
  color: white;
}

.btn-secundario {
  background: #f2f2f2;
  color: #111;
}

canvas{
margin-top:35px;
width:100%;
max-width:480px;
border-radius:20px;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

#splash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;

  background: linear-gradient(135deg, #ff7a00, #ff9a2f);

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  z-index: 9999;

  transition: opacity 0.5s ease;
}

#splash h1 {
  font-size: 12vw;
  margin: 0;
  color: white;
  font-weight: 700;
  text-shadow: 0 4px 10px 
  rgba(0,0,0,0.2);
}

#splash p {
  margin-top: 10px;
  font-size: 5vw;
  color: white;
  letter-spacing: 2px;
  opacity: 0.9;
}

.splash-content {
  text-align: center;
  color: white;
  animation: fadeIn 1s ease;
}

.logo {
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -2px;
}

#splash.hidden {
  opacity: 0;
  pointer-events: none;
}

body {
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.loading {
  display: none;
  text-align: center;
  margin-top: 20px;
  animation: fadeIn 0.4s ease;
}

.loading.active {
  display: block;
}

.spinner {
  width: 28px;
  height: 28px;
  border: 3px solid rgba(0,0,0,0.1);
  border-top: 3px solid #ff7a00;
  border-radius: 50%;
  margin: 0 auto 10px;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div id="splash">
  <div class="splash-content">
    <div class="logo">VS</div>
    <h1>Verso Studio</h1>
  </div>
</div>

<header>VERSO STUDIO</header>

<div class="container">

<div class="generator">

<input type="text" id="description" placeholder="Descrição (ex: Versículo do Dia)">
<input type="text" id="reference" placeholder="Digite a referência (ex: João 3:16)">
<select id="version">
<option value="almeida">Almeida</option>
<option value="kjv">King James</option>
</select>

<div class="templates">
<div class="template" style="background-image:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb')" onclick="selectTemplate(this)"></div>
<div class="template" style="background-image:url('https://images.unsplash.com/photo-1497436072909-60f360e1d4b1')" onclick="selectTemplate(this)"></div>
<div class="template" style="background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')" onclick="selectTemplate(this)"></div>
<div class="template" style="background-image:url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e')" onclick="selectTemplate(this)"></div>
</div>

<input type="file" id="upload" accept="image/*">

<button onclick="buscarVersiculo()">Gerar Imagem</button>

<div id="loading" style="display:none; text-align:center; margin-top:20px;">
  <div style="
    width:28px;
    height:28px;
    border:3px solid rgba(0,0,0,0.1);
    border-top:3px solid #ff7a00;
    border-radius:50%;
    margin:0 auto 10px;
    animation:spin 0.8s linear infinite;">
  </div>
  <p>Gerando seu verso...</p>
</div>

<button onclick="baixarImagem()">
Salvar Imagem
</button>

<button onclick="compartilharImagem()">
Compartilhar
</button>

</div>

<canvas id="canvas" width="1080" height="1080"></canvas>

<div style="margin-top:60px;width:100%;max-width:480px">
<h3 style="margin-bottom:15px;color:#ff7a00">Artigos</h3>
<input type="text" id="search" placeholder="Buscar artigo..." onkeyup="buscarArtigo()">
<div id="articles"></div>
</div>

</div>

<script>

const versiculosDoDia = [
  "Salmos 23:1|O Senhor é o meu pastor; nada me faltará.",
  "Filipenses 4:13|Posso todas as coisas naquele que me fortalece.",
  "Jeremias 29:11|Porque eu bem sei os pensamentos que tenho a vosso respeito.",
  "Provérbios 3:5|Confia no Senhor de todo o teu coração.",
  "Isaías 41:10|Não temas, porque eu sou contigo."
];

function versiculoAutomatico() {

  const hoje = new Date();

  const numero = hoje.getFullYear() + hoje.getMonth() + hoje.getDate();

  const indice = numero % versiculosDoDia.length;

  const dados = versiculosDoDia[indice].split("|");

  const referencia = dados[0];
  const texto = dados[1];

  desenharNoCanvas(texto, referencia);
}

function desenharNoCanvas(texto, referencia) {

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;

  // ===== CAIXA DE FUNDO (GLASS EFFECT) =====
  const boxWidth = canvas.width * 0.85;
  const boxHeight = canvas.height * 0.28;
  const boxX = centerX - boxWidth / 2;
  const boxY = centerY - boxHeight / 2;

  ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
  ctx.beginPath();
  ctx.roundRect(boxX, boxY, boxWidth, boxHeight, 25);
  ctx.fill();

  // ===== TEXTO PRINCIPAL =====
  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.shadowColor = "rgba(0,0,0,0.8)";
  ctx.shadowBlur = 10;

  ctx.font = "bold 34px Arial";

  const maxWidth = boxWidth * 0.85;
  const lineHeight = 42;

  let y = boxY + 60;

  function wrapText(context, text, x, y, maxWidth, lineHeight) {
    const words = text.split(" ");
    let line = "";

    for (let n = 0; n < words.length; n++) {
      const testLine = line + words[n] + " ";
      const metrics = context.measureText(testLine);
      const testWidth = metrics.width;

      if (testWidth > maxWidth && n > 0) {
        context.fillText(line, x, y);
        line = words[n] + " ";
        y += lineHeight;
      } else {
        line = testLine;
      }
    }

    context.fillText(line, x, y);
    return y;
  }

  y = wrapText(ctx, texto, centerX, y, maxWidth, lineHeight);

  // ===== REFERÊNCIA =====
  ctx.font = "20px Arial";
  ctx.fillStyle = "#ff7a00";
  ctx.shadowBlur = 6;

  ctx.fillText(referencia, centerX, boxY + boxHeight - 30);

const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
gradient.addColorStop(0, "rgba(0,0,0,0.2)");
gradient.addColorStop(1, "rgba(0,0,0,0.7)");
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, canvas.width, canvas.height);
}

let selectedImage=null;
let uploadedImage=null;

function selectTemplate(el){
selectedImage=new Image();
selectedImage.crossOrigin="anonymous";
selectedImage.src=el.style.backgroundImage.slice(5,-2);
}

document.getElementById("upload").addEventListener("change",function(e){
const reader=new FileReader();
reader.onload=function(event){
uploadedImage=new Image();
uploadedImage.src=event.target.result;
}
reader.readAsDataURL(e.target.files[0]);
});

async function buscarVersiculo(){
const ref=document.getElementById("reference").value;
const desc=document.getElementById("description").value;
const version=document.getElementById("version").value;

const response=await fetch(`https://bible-api.com/${ref}?translation=${version}`);
const data=await response.json();

gerarImagem(data.text,ref,desc);
}

function gerarImagem(texto,ref,desc){

const loading = document.getElementById("loading");

  if (!loading) {
    alert("Elemento loading não encontrado");
    return;
  }

  loading.style.display = "block";

  setTimeout(() => {

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// animação inicial
canvas.style.transition = "none";
canvas.style.opacity = "0";
canvas.style.transform = "scale(0.96)";

setTimeout(() => {

ctx.clearRect(0,0,1080,1080);

let img = uploadedImage || selectedImage;

if(img){
    ctx.filter = "blur(8px)";
    ctx.drawImage(img,0,0,1080,1080);
    ctx.filter = "none";
}else{
    ctx.fillStyle = "#222";
    ctx.fillRect(0,0,1080,1080);
}

// overlay escuro
ctx.fillStyle = "rgba(0,0,0,0.45)";
ctx.fillRect(0,0,1080,1080);

// sombra para contraste automático
ctx.fillStyle = "#ffffff";
ctx.shadowColor = "rgba(0,0,0,0.8)";
ctx.shadowBlur = 25;
ctx.textAlign = "left";

// descrição
ctx.font = "50px Inter";
ctx.fillText(desc || "",100,150);

// versículo
ctx.font = "75px Playfair Display";
wrapText(ctx,texto,100,350,880,90);

// referência
ctx.font = "45px Inter";
ctx.fillText(ref || "",100,980);

let history = JSON.parse(localStorage.getItem("history")) || [];
history.push({texto,ref,desc});
localStorage.setItem("history", JSON.stringify(history));

// animação final
canvas.style.transition = "all 0.6s ease";
canvas.style.opacity = "1";
canvas.style.transform = "scale(1)";

},200);

loading.style.display = "none";

  }, 1500);
}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){
const words=text.split(" ");
let line="";
for(let n=0;n<words.length;n++){
const testLine=line+words[n]+" ";
const metrics=ctx.measureText(testLine);
if(metrics.width>maxWidth && n>0){
ctx.fillText(line,x,y);
line=words[n]+" ";
y+=lineHeight;
}else{
line=testLine;
}
}
ctx.fillText(line,x,y);
}

const artigos=[
{titulo:"Como meditar na Palavra",conteudo:"Aprenda a aplicar versículos no dia a dia."},
{titulo:"O poder da fé",conteudo:"A fé move montanhas."},
{titulo:"Versículos sobre esperança",conteudo:"Esperança em tempos difíceis."}
];

function buscarArtigo(){
const termo=document.getElementById("search").value.toLowerCase();
const area=document.getElementById("articles");
area.innerHTML="";
artigos.filter(a=>a.titulo.toLowerCase().includes(termo))
.forEach(a=>{
area.innerHTML+=`
<div style="padding:15px;background:rgba(255,255,255,0.05);border-radius:15px;margin-bottom:10px">
<h4>${a.titulo}</h4>
<p style="opacity:0.7">${a.conteudo}</p>
</div>`;
});
}

</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js");
  });
}

function baixarImagem() {

  const canvas = document.getElementById("canvas");

  if (!canvas) {
    alert("Canvas não encontrado.");
    return;
  }

  const link = document.createElement("a");
  link.download = "verso-studio.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

async function compartilharImagem() {

  const canvas = document.getElementById("canvas");

  if (!canvas) {
    alert("Canvas não encontrado.");
    return;
  }

  canvas.toBlob(async (blob) => {

    const file = new File([blob], "verso-studio.png", {
      type: "image/png"
    });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {

      try {
        await navigator.share({
          files: [file],
          title: "Verso Studio",
          text: "Olha esse versículo que criei no Verso Studio 🧡"
        });

      } catch (error) {
        console.log("Erro ao compartilhar:", error);
      }

    } else {
      alert("Seu dispositivo não suporta compartilhamento direto.");
    }

  }, "image/png");
}

window.addEventListener("load", () => {

versiculoAutomatico();

  setTimeout(() => {
    document.getElementById("splash").classList.add("hidden");
  }, 1800);
});
</script>
</body>
</html>
