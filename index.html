<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff7a00">

<title>Verso Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter,sans-serif;
background:linear-gradient(135deg,#1c1c1c,#0f0f0f);
color:white;
overflow-x:hidden;
}

header{
padding:25px;
text-align:center;
font-size:22px;
font-weight:600;
letter-spacing:2px;
color:#ff7a00;
}

.container{
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
}

.generator{
width:100%;
max-width:480px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border-radius:25px;
padding:25px;
box-shadow:0 25px 50px rgba(0,0,0,0.5);
animation:fadeUp 1s ease;
}

input,select{
width:100%;
padding:14px;
margin-bottom:14px;
border:none;
border-radius:14px;
background:rgba(255,255,255,0.07);
color:white;
font-size:14px;
transition:0.3s;
}

input:focus,select:focus{
outline:none;
background:rgba(255,255,255,0.15);
transform:scale(1.02);
}

.templates{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:15px;
}

.template{
height:80px;
border-radius:14px;
background-size:cover;
background-position:center;
cursor:pointer;
transition:0.4s;
}

.template:hover{
transform:scale(1.05);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff7a00,#ffb347);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

canvas{
margin-top:35px;
width:100%;
max-width:480px;
border-radius:20px;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<header>VERSO STUDIO</header>

<div class="container">

<div class="generator">

<input type="text" id="description" placeholder="Descrição (ex: Versículo do Dia)">
<input type="text" id="reference" placeholder="Digite a referência (ex: João 3:16)">
<select id="version">
<option value="almeida">Almeida</option>
<option value="kjv">King James</option>
</select>

<div class="templates">
<div class="template" style="background-image:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb')" onclick="selectTemplate(this)"></div>
<div class="template" style="background-image:url('https://images.unsplash.com/photo-1497436072909-60f360e1d4b1')" onclick="selectTemplate(this)"></div>
<div class="template" style="background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')" onclick="selectTemplate(this)"></div>
<div class="template" style="background-image:url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e')" onclick="selectTemplate(this)"></div>
</div>

<input type="file" id="upload" accept="image/*">

<button onclick="buscarVersiculo()">Gerar Imagem</button>

<button onclick="baixarImagem()">
Salvar Imagem
</button>

</div>

<canvas id="canvas" width="1080" height="1080"></canvas>

<div style="margin-top:60px;width:100%;max-width:480px">
<h3 style="margin-bottom:15px;color:#ff7a00">Artigos</h3>
<input type="text" id="search" placeholder="Buscar artigo..." onkeyup="buscarArtigo()">
<div id="articles"></div>
</div>

</div>

<script>
let selectedImage=null;
let uploadedImage=null;

function selectTemplate(el){
selectedImage=new Image();
selectedImage.crossOrigin="anonymous";
selectedImage.src=el.style.backgroundImage.slice(5,-2);
}

document.getElementById("upload").addEventListener("change",function(e){
const reader=new FileReader();
reader.onload=function(event){
uploadedImage=new Image();
uploadedImage.src=event.target.result;
}
reader.readAsDataURL(e.target.files[0]);
});

async function buscarVersiculo(){
const ref=document.getElementById("reference").value;
const desc=document.getElementById("description").value;
const version=document.getElementById("version").value;

const response=await fetch(`https://bible-api.com/${ref}?translation=${version}`);
const data=await response.json();

gerarImagem(data.text,ref,desc);
}

function gerarImagem(texto,ref,desc){

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// animação inicial
canvas.style.transition = "none";
canvas.style.opacity = "0";
canvas.style.transform = "scale(0.96)";

setTimeout(() => {

ctx.clearRect(0,0,1080,1080);

let img = uploadedImage || selectedImage;

if(img){
    ctx.filter = "blur(8px)";
    ctx.drawImage(img,0,0,1080,1080);
    ctx.filter = "none";
}else{
    ctx.fillStyle = "#222";
    ctx.fillRect(0,0,1080,1080);
}

// overlay escuro
ctx.fillStyle = "rgba(0,0,0,0.45)";
ctx.fillRect(0,0,1080,1080);

// sombra para contraste automático
ctx.fillStyle = "#ffffff";
ctx.shadowColor = "rgba(0,0,0,0.8)";
ctx.shadowBlur = 25;
ctx.textAlign = "left";

// descrição
ctx.font = "50px Inter";
ctx.fillText(desc || "",100,150);

// versículo
ctx.font = "75px Playfair Display";
wrapText(ctx,texto,100,350,880,90);

// referência
ctx.font = "45px Inter";
ctx.fillText(ref || "",100,980);

let history = JSON.parse(localStorage.getItem("history")) || [];
history.push({texto,ref,desc});
localStorage.setItem("history", JSON.stringify(history));

// animação final
canvas.style.transition = "all 0.6s ease";
canvas.style.opacity = "1";
canvas.style.transform = "scale(1)";

},200);
}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){
const words=text.split(" ");
let line="";
for(let n=0;n<words.length;n++){
const testLine=line+words[n]+" ";
const metrics=ctx.measureText(testLine);
if(metrics.width>maxWidth && n>0){
ctx.fillText(line,x,y);
line=words[n]+" ";
y+=lineHeight;
}else{
line=testLine;
}
}
ctx.fillText(line,x,y);
}

const artigos=[
{titulo:"Como meditar na Palavra",conteudo:"Aprenda a aplicar versículos no dia a dia."},
{titulo:"O poder da fé",conteudo:"A fé move montanhas."},
{titulo:"Versículos sobre esperança",conteudo:"Esperança em tempos difíceis."}
];

function buscarArtigo(){
const termo=document.getElementById("search").value.toLowerCase();
const area=document.getElementById("articles");
area.innerHTML="";
artigos.filter(a=>a.titulo.toLowerCase().includes(termo))
.forEach(a=>{
area.innerHTML+=`
<div style="padding:15px;background:rgba(255,255,255,0.05);border-radius:15px;margin-bottom:10px">
<h4>${a.titulo}</h4>
<p style="opacity:0.7">${a.conteudo}</p>
</div>`;
});
}

</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js");
  });
}
</script>

</body>
</html>
