<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Versículo Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: 'Inter', sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 15px;
}

.app{
  width:100%;
  max-width:500px;
}

h1{
  font-weight:500;
  margin-bottom:20px;
  font-size:22px;
  letter-spacing:1px;
  opacity:0.9;
}

input, select{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:white;
  color:black;
  font-weight:500;
  cursor:pointer;
  margin-bottom:10px;
  transition:0.3s;
}

button:hover{
  opacity:0.8;
}

canvas{
  margin-top:25px;
  border-radius:25px;
  width:100%;
  max-width:500px;
}
</style>
</head>

<body>

<div class="app">
  <h1>Versículo Studio</h1>

  <input type="text" id="title" placeholder="Título (ex: Versículo do Dia)">
  <input type="text" id="reference" placeholder="Referência (ex: Salmos 37:4)">
  
  <select id="version">
    <option value="NAA">NAA</option>
    <option value="NVI">NVI</option>
    <option value="ARA">ARA</option>
  </select>

  <input type="file" id="upload" accept="image/*">

  <button onclick="generateImage()">Gerar</button>
  <button onclick="downloadImage()">Baixar</button>
</div>

<canvas id="canvas" width="1080" height="1080"></canvas>

<script>
const bible = {
  "Salmos 37:4": {
    "NAA": "Agrade-se do Senhor, e ele satisfará os desejos do seu coração.",
    "NVI": "Deleite-se no Senhor, e ele atenderá aos desejos do seu coração.",
    "ARA": "Agrada-te do Senhor, e ele satisfará os desejos do teu coração."
  },
  "João 3:16": {
    "NAA": "Porque Deus amou o mundo de tal maneira que deu o seu Filho unigênito...",
    "NVI": "Porque Deus tanto amou o mundo que deu o seu Filho unigênito...",
    "ARA": "Porque Deus amou ao mundo de tal maneira que deu o seu Filho unigênito..."
  }
};

let uploadedImage = null;

document.getElementById("upload").addEventListener("change", function(e){
  const reader = new FileReader();
  reader.onload = function(event){
    uploadedImage = new Image();
    uploadedImage.src = event.target.result;
  }
  reader.readAsDataURL(e.target.files[0]);
});

function generateImage(){
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const title = document.getElementById("title").value;
  const reference = document.getElementById("reference").value;
  const version = document.getElementById("version").value;

  let verse = bible[reference]?.[version] || "Versículo não encontrado.";

  if(uploadedImage){
    ctx.drawImage(uploadedImage,0,0,1080,1080);
  } else {
    ctx.fillStyle="#111827";
    ctx.fillRect(0,0,1080,1080);
  }

  ctx.fillStyle="rgba(0,0,0,0.45)";
  ctx.fillRect(0,0,1080,1080);

  ctx.fillStyle="white";
  ctx.textAlign="left";

  ctx.font="40px Inter";
  ctx.fillText(title,100,150);

  ctx.font="60px Playfair Display";
  wrapText(ctx, verse, 100, 350, 880, 80);

  ctx.font="40px Inter";
  ctx.fillText(reference+" "+version,100,1000);
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight){
  const words=text.split(" ");
  let line="";
  for(let n=0;n<words.length;n++){
    const testLine=line+words[n]+" ";
    const metrics=ctx.measureText(testLine);
    if(metrics.width>maxWidth && n>0){
      ctx.fillText(line,x,y);
      line=words[n]+" ";
      y+=lineHeight;
    }else{
      line=testLine;
    }
  }
  ctx.fillText(line,x,y);
}

function downloadImage(){
  const canvas=document.getElementById("canvas");
  const link=document.createElement("a");
  link.download="versiculo.png";
  link.href=canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
