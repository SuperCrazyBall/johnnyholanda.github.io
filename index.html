<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VersoStudio Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter,sans-serif;
background:#0f0f1a;
color:white;
overflow-x:hidden;
}

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
background:radial-gradient(circle at 30% 20%,#6d28d9,#111827 60%);
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:42px;
max-width:600px;
animation:fadeUp 1s ease;
}

.hero p{
margin-top:20px;
opacity:0.8;
animation:fadeUp 1.4s ease;
}

.section{
padding:50px 20px;
display:flex;
flex-direction:column;
align-items:center;
}

.generator{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:25px;
border-radius:25px;
width:100%;
max-width:480px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
animation:fadeUp 1s ease;
}

input,select{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:15px;
background:rgba(255,255,255,0.08);
color:white;
font-size:14px;
transition:0.3s;
}

input:focus{
background:rgba(255,255,255,0.15);
transform:scale(1.02);
outline:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,#9333ea,#6366f1);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

canvas{
margin-top:40px;
width:100%;
max-width:480px;
border-radius:20px;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<section class="hero">
<h1>Transforme Versículos em Arte Digital</h1>
<p>Digite apenas a referência e gere imagens modernas automaticamente.</p>
</section>

<section class="section">

<div class="generator">

<input type="text" id="reference" placeholder="Digite: João 3:16">

<select id="version">
<option value="almeida">Almeida</option>
<option value="kjv">King James</option>
</select>

<input type="file" id="upload" accept="image/*">

<button onclick="buscarVersiculo()">Buscar e Gerar</button>

</div>

<canvas id="canvas" width="1080" height="1080"></canvas>

</section>

<script>
let uploadedImage=null;

document.getElementById("upload").addEventListener("change",function(e){
const reader=new FileReader();
reader.onload=function(event){
uploadedImage=new Image();
uploadedImage.src=event.target.result;
}
reader.readAsDataURL(e.target.files[0]);
});

async function buscarVersiculo(){

const ref=document.getElementById("reference").value;
const version=document.getElementById("version").value;

const response=await fetch(`https://bible-api.com/${ref}?translation=${version}`);
const data=await response.json();

gerarImagem(data.text,ref);
}

function gerarImagem(texto,ref){

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

if(uploadedImage){
ctx.drawImage(uploadedImage,0,0,1080,1080);
}else{
ctx.fillStyle="#111827";
ctx.fillRect(0,0,1080,1080);
}

ctx.fillStyle="rgba(0,0,0,0.5)";
ctx.fillRect(0,0,1080,1080);

ctx.fillStyle="white";
ctx.font="70px Playfair Display";
wrapText(ctx,texto,100,300,880,90);

ctx.font="45px Inter";
ctx.fillText(ref,100,980);
}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){
const words=text.split(" ");
let line="";
for(let n=0;n<words.length;n++){
const testLine=line+words[n]+" ";
const metrics=ctx.measureText(testLine);
if(metrics.width>maxWidth && n>0){
ctx.fillText(line,x,y);
line=words[n]+" ";
y+=lineHeight;
}else{
line=testLine;
}
}
ctx.fillText(line,x,y);
}
</script>

</body>
</html>
