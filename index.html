<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VersoStudio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

.app{
  width:100%;
  max-width:480px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:28px;
  padding:25px;
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
  animation:fadeUp 0.8s ease;
}

h1{
  text-align:center;
  font-weight:700;
  margin-bottom:20px;
  letter-spacing:1px;
}

input, textarea{
  width:100%;
  padding:16px;
  margin-bottom:14px;
  border:none;
  border-radius:16px;
  background:rgba(255,255,255,0.07);
  color:white;
  font-size:15px;
  transition:0.3s;
}

input:focus, textarea:focus{
  outline:none;
  background:rgba(255,255,255,0.12);
  transform:scale(1.02);
}

.templates{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.template{
  flex:1;
  height:60px;
  border-radius:14px;
  cursor:pointer;
  transition:0.3s;
}

.template:hover{
  transform:scale(1.08);
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  background:white;
  color:black;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
  margin-top:8px;
}

button:hover{
  transform:scale(1.05);
}

canvas{
  margin-top:30px;
  width:100%;
  max-width:480px;
  border-radius:25px;
  animation:fadeUp 0.6s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="app">
<h1>VersoStudio</h1>

<input type="text" id="title" placeholder="Título (ex: Versículo do Dia)">
<textarea id="verse" placeholder="Digite qualquer versículo aqui..."></textarea>
<input type="text" id="reference" placeholder="Referência (ex: João 3:16)">

<div class="templates">
  <div class="template" style="background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb') center/cover" onclick="setTemplate(this)"></div>
  <div class="template" style="background:url('https://images.unsplash.com/photo-1497436072909-60f360e1d4b1') center/cover" onclick="setTemplate(this)"></div>
  <div class="template" style="background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover" onclick="setTemplate(this)"></div>
</div>

<input type="file" id="upload" accept="image/*">

<button onclick="generateImage()">Gerar Imagem</button>
<button onclick="downloadImage()">Baixar</button>

</div>

<canvas id="canvas" width="1080" height="1080"></canvas>

<script>
let selectedImage = null;
let uploadedImage = null;

function setTemplate(el){
  selectedImage = new Image();
  selectedImage.crossOrigin = "anonymous";
  selectedImage.src = el.style.backgroundImage.slice(5,-2);
}

document.getElementById("upload").addEventListener("change",function(e){
  const reader = new FileReader();
  reader.onload=function(event){
    uploadedImage = new Image();
    uploadedImage.src=event.target.result;
  }
  reader.readAsDataURL(e.target.files[0]);
});

function generateImage(){
  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");

  const title=document.getElementById("title").value;
  const verse=document.getElementById("verse").value;
  const reference=document.getElementById("reference").value;

  if(uploadedImage){
    ctx.drawImage(uploadedImage,0,0,1080,1080);
  }else if(selectedImage){
    ctx.drawImage(selectedImage,0,0,1080,1080);
  }else{
    ctx.fillStyle="#111827";
    ctx.fillRect(0,0,1080,1080);
  }

  ctx.fillStyle="rgba(0,0,0,0.45)";
  ctx.fillRect(0,0,1080,1080);

  ctx.fillStyle="white";
  ctx.textAlign="left";

  ctx.font="50px Inter";
  ctx.fillText(title,100,150);

  ctx.font="70px Inter";
  wrapText(ctx,verse,100,350,880,80);

  ctx.font="45px Inter";
  ctx.fillText(reference,100,980);
}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){
  const words=text.split(" ");
  let line="";
  for(let n=0;n<words.length;n++){
    const testLine=line+words[n]+" ";
    const metrics=ctx.measureText(testLine);
    if(metrics.width>maxWidth && n>0){
      ctx.fillText(line,x,y);
      line=words[n]+" ";
      y+=lineHeight;
    }else{
      line=testLine;
    }
  }
  ctx.fillText(line,x,y);
}

function downloadImage(){
  const canvas=document.getElementById("canvas");
  const link=document.createElement("a");
  link.download="versiculo.png";
  link.href=canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
